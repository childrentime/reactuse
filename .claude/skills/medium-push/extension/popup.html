<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    h3 {
      font-size: 15px;
      font-weight: 600;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #666;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #d1d5db;
    }
    .dot.ok { background: #22c55e; }
    .dot.err { background: #ef4444; }
    .dot.warn { background: #f59e0b; }
    textarea {
      width: 100%;
      height: 240px;
      border: 1px solid #e2e2e2;
      border-radius: 8px;
      padding: 10px;
      font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      background: #fff;
      color: #1a1a1a;
    }
    textarea:focus {
      outline: none;
      border-color: #22c55e;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.15);
    }
    textarea::placeholder { color: #aaa; }
    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #888;
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    button {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary {
      background: #22c55e;
      color: #fff;
    }
    .btn-primary:hover { background: #16a34a; }
    .btn-primary:active { background: #15803d; }
    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .toast {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }
    .toast.ok {
      display: block;
      background: #f0fdf4;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    .toast.err {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <h3>Medium Push</h3>
    <div class="status">
      <div id="dot" class="dot"></div>
      <span id="statusText">Checking...</span>
    </div>
  </div>
  <textarea id="content" placeholder="Paste markdown content here, or use Open File...&#10;&#10;YAML frontmatter will be stripped automatically.&#10;The first # heading becomes the Medium title."></textarea>
  <div class="hint">Markdown is auto-converted to rich text for Medium's editor.</div>
  <div class="actions">
    <button class="btn-secondary" id="fileBtn">Open File</button>
    <button class="btn-primary" id="pasteBtn">Push to Medium</button>
  </div>
  <div id="toast" class="toast"></div>
  <input type="file" id="fileInput" accept=".md,.markdown,.txt">
  <script src="popup.js"></script>
</body>
</html>
